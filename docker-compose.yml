services:
  # ─────────────────────────────────────────────
  # 1. PostgreSQL — dev'de ephemeral (container gidince data uçar)
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: chess-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chess_realtime_server_dev
    ports:
      - "5432:5432"
    # DEV: volume yok → container rm -f chess-db deyince data uçar
    # PROD için: volumes: - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # 2. GoTrue Auth
  # ─────────────────────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.155.1
    container_name: chess-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_DATABASE_DRIVER: postgres
      GOTRUE_DATABASE_URL: postgres://postgres:postgres@db:5432/chess_realtime_server_dev?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: super-secret-jwt-key-replace-me-in-prod
      GOTRUE_JWT_EXP: 3600
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DB_MAX_POOL_SIZE: 20
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_URI_ALLOW_LIST: "http://localhost:3000/**,http://localhost:3001/**"

  # ─────────────────────────────────────────────
  # 3. MinIO — dev'de ephemeral
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: chess-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    # DEV: volume yok → uçar

  # ─────────────────────────────────────────────
  # 4. Elixir Phoenix Backend
  # ─────────────────────────────────────────────
  chess_realtime_server:
    build:
      context: ./apps/backend/chess_realtime_server
      dockerfile: Dockerfile
    container_name: chess-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/chess_realtime_server_dev
      SECRET_KEY_BASE: Q2hlc3NSZWFsdGltZVNlcnZlcl9TZWNyZXRfS2V5X0Jhc2VfTG9uZ19Fbm91Z2hfVG9fUGFzc0NoZWNrcw==
      PHX_HOST: localhost
      PORT: 4000
      PHX_SERVER: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
    ports:
      - "4000:4000"

  # ─────────────────────────────────────────────
  # 5. SaaS Landing → http://localhost:3000
  #    node_modules container içinde, host'a sızmaz
  # ─────────────────────────────────────────────
  chess_saas:
    build:
      context: ./apps/chess-game-saas
      dockerfile: Dockerfile.dev
    container_name: chess-saas
    restart: unless-stopped
    volumes:
      # Kaynak kod host'tan mount edilir (hot-reload)
      - ./apps/chess-game-saas:/app
      # node_modules anonymous volume → container'a ait, host'a sızmaz
      - /app/node_modules
      # .next build cache de container'a ait
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: ws://localhost:4000/socket
      NEXT_PUBLIC_AUTH_URL: http://localhost:9999
    depends_on:
      - chess_realtime_server

  # ─────────────────────────────────────────────
  # 6. Chess App → http://localhost:3001
  # ─────────────────────────────────────────────
  chess_app:
    build:
      context: ./apps/chess-game
      dockerfile: Dockerfile.dev
    container_name: chess-app
    restart: unless-stopped
    volumes:
      - ./apps/chess-game:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SAAS_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: ws://localhost:4000/socket
      NEXT_PUBLIC_MINIO_URL: http://localhost:9000
      NEXT_PUBLIC_AUTH_URL: http://localhost:9999
    depends_on:
      - chess_realtime_server

# Named volumes YOK → her şey ephemeral
# pnpm run docker:down ile container'lar silinir, veri uçar
# pnpm run docker:up ile temiz başlar
